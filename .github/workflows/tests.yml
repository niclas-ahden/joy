name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22

      # Use PR #173 which fixes GitHub Actions cache rate limiting
      # https://github.com/DeterminateSystems/magic-nix-cache/pull/173
      # Remove source-pr once the fix is released
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          source-pr: 173

      - name: Fetch Nix dependencies
        run: nix develop --command true

      - name: Run tests
        run: nix develop -c sh -c './tests.sh'
