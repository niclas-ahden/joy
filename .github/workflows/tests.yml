name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          # Trust magic-nix-cache-action's local cache server and accept its unsigned paths
          extra_nix_config: |
            substituters = https://cache.nixos.org http://127.0.0.1:37515
            trusted-substituters = https://cache.nixos.org http://127.0.0.1:37515
            require-sigs = false
            max-substitution-jobs = 4

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Fetch Nix dependencies
        run: nix develop --command true

      - name: Run tests
        run: nix develop -c sh -c './tests.sh'
